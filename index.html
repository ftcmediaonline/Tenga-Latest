<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>Tenga</title>
    <meta name="description" content="Your favorite shops, all in one place" />
    <meta name="author" content="Tenga" />

    <!-- Open Graph (link previews: Slack, Discord, LinkedIn, iMessage, etc.) -->
    <meta property="og:site_name" content="Tenga" />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:title" content="Tenga" />
    <meta property="og:description" content="Your favorite shops, all in one place" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="%SITE_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Tenga — Your favorite shops, all in one place" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Tenga" />
    <meta name="twitter:title" content="Tenga" />
    <meta name="twitter:description" content="Your favorite shops, all in one place" />
    <meta name="twitter:image" content="%SITE_URL%/og-image.png" />
    <meta name="twitter:image:alt" content="Tenga — Your favorite shops, all in one place" />
    <!-- Frame-busting for iVeri LiteBox redirects -->
    <script>
      (function() {
        if (window !== window.parent) {
          var search = window.location.search;
          if (search.indexOf('order=') !== -1 && search.indexOf('nonce=') !== -1) {
            window.parent.location.href = window.location.href;
          }
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
